<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TriPro Admin</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
body{background:#f0f2f5;padding:20px;color:#333}
.container{max-width:1400px;margin:0 auto}
h1{font-size:24px;margin-bottom:20px}
.filters{margin-bottom:15px;display:flex;gap:10px;flex-wrap:wrap}
.filters select,.filters input{padding:8px 12px;border:1px solid #ccc;border-radius:6px;font-size:14px}
.filters button{padding:8px 18px;background:#1877f2;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:14px}
.filters button:hover{background:#166fe5}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.1)}
th{background:#1877f2;color:#fff;padding:12px 8px;text-align:left;font-size:13px;white-space:nowrap}
td{padding:10px 8px;border-bottom:1px solid #f0f0f0;font-size:13px;vertical-align:top}
tr:hover{background:#f8faff}
.type-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.type-akfa{background:#e3f2fd;color:#1565c0}
.type-prof{background:#fce4ec;color:#c62828}
.status{padding:3px 10px;border-radius:12px;font-size:12px;font-weight:500}
.pending{background:#fff3e0;color:#e65100}
.material_delivered{background:#e8f5e9;color:#2e7d32}
.assembling{background:#f3e5f5;color:#6a1b9a}
.cutting{background:#e1f5fe;color:#0277bd}
.ready{background:#e8f5e9;color:#1b5e20}
.accepted{background:#e8f5e9;color:#2e7d32}
.completed{background:#e8eaf6;color:#283593}
td.actions{white-space:nowrap}
.actions select{padding:4px 6px;border:1px solid #ccc;border-radius:4px;font-size:12px}
.actions button{padding:4px 10px;background:#1877f2;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:12px;margin:2px}
.actions button:hover{opacity:.9}
.actions .btn-accept{background:#43a047}
.actions .btn-complete{background:#1565c0}
.empty{text-align:center;padding:40px;color:#999}
pre{white-space:pre-wrap;word-break:break-word;margin:0;font-size:12px;line-height:1.4}
@media(max-width:768px){table{font-size:12px}th,td{padding:6px 4px}}
</style>
</head>
<body>
<div class="container">
<h1>🔧 TriPro Admin Paneli</h1>
<div class="filters">
<select id="typeFilter" onchange="applyFilters()">
<option value="">Barcha turlar</option>
<option value="akfa">AKFA buyurtmalari</option>
<option value="profilaktika">Profilaktika</option>
</select>
<select id="statusFilter" onchange="applyFilters()">
<option value="">Barcha statuslar</option>
<option value="pending">⏳ Kutilmoqda</option>
<option value="material_delivered">🚚 Material olib kelindi</option>
<option value="assembling">🔧 Yig'ilmoqda</option>
<option value="cutting">🪟 Oyna kesilmoqda</option>
<option value="ready">📦 Tayyor</option>
<option value="accepted">✅ Qabul qilingan</option>
<option value="completed">🏁 Yakunlangan</option>
</select>
<input type="text" id="searchInput" placeholder="Ism, telefon yoki ID bo'yicha qidirish..." oninput="applyFilters()">
<button onclick="applyFilters()">🔄 Yangilash</button>
</div>
<div style="overflow-x:auto">
<table id="ordersTable">
<thead>
<tr>
<th>T/r</th><th>Tur</th><th>ID</th><th>Mijoz</th><th>Telefon</th><th>Ma'lumot</th><th>Status</th><th>Yaratilgan</th><th>Amallar</th>
</tr>
</thead>
<tbody id="ordersBody">
<tr><td colspan="9" class="empty">Yuklanmoqda...</td></tr>
</tbody>
</table>
</div>
</div>
<script>
let orders = [];

async function loadOrders() {
try {
const res = await fetch('/api/orders');
orders = await res.json();
applyFilters();
} catch(e) {
document.getElementById('ordersBody').innerHTML = '<tr><td colspan="9" class="empty">Xatolik yuz berdi. Server ishlayotganligiga ishonch hosil qiling.</td></tr>';
}
}

function statusLabel(s) {
const m = {
'pending':'⏳ Kutilmoqda','material_delivered':'🚚 Material olib kelindi',
'assembling':'🔧 Yig\'ilmoqda','cutting':'🪟 Oyna kesilmoqda',
'ready':'📦 Tayyor','accepted':'✅ Qabul qilingan','completed':'🏁 Yakunlangan'
};
return m[s] || s;
}

function applyFilters() {
const typeFilter = document.getElementById('typeFilter').value;
const statusFilter = document.getElementById('statusFilter').value;
const search = document.getElementById('searchInput').value.toLowerCase();

let filtered = orders.filter(o => {
if (typeFilter && o.type !== typeFilter) return false;
if (statusFilter && o.status !== statusFilter) return false;
if (search) {
const haystack = (o.client + ' ' + o.phone + ' ' + o.order_id).toLowerCase();
if (!haystack.includes(search)) return false;
}
return true;
});

let html = '';
filtered.forEach((o, i) => {
const isProf = o.type === 'profilaktika';
const typeBadge = isProf ? 'type-prof' : 'type-akfa';
const typeLabel = isProf ? 'Profilaktika' : 'AKFA';
let actionsHtml = '';
if (isProf) {
actionsHtml = `
<button class="btn-accept" onclick="updateStatus(${o.pk},'profilaktika','accepted')">✅ Qabul qilish</button>
<button class="btn-complete" onclick="updateStatus(${o.pk},'profilaktika','completed')">🏁 Ish yakunlandi</button>
`;
} else {
actionsHtml = `<select onchange="updateStatus('${o.order_id}','akfa',this.value)"><option value="">--</option>`;
const statuses = [['pending','⏳ Kutilmoqda'],['material_delivered','🚚 Material olib kelindi'],['assembling','🔧 Yig\'ilmoqda'],['cutting','🪟 Oyna kesilmoqda'],['ready','📦 Tayyor']];
statuses.forEach(([v,l]) => { actionsHtml += `<option value="${v}"${o.status===v?' selected':''}>${l}</option>`; });
actionsHtml += `</select>`;
}
html += `<tr>
<td>${i+1}</td>
<td><span class="type-badge ${typeBadge}">${typeLabel}</span></td>
<td>${o.order_id || o.id}</td>
<td>${o.client}</td>
<td>${o.phone}</td>
<td><pre>${o.info}</pre></td>
<td><span class="status ${o.status}">${statusLabel(o.status)}</span></td>
<td>${o.created_at}</td>
<td class="actions">${actionsHtml}</td>
</tr>`;
});
if (!html) html = '<tr><td colspan="9" class="empty">Hech qanday buyurtma topilmadi</td></tr>';
document.getElementById('ordersBody').innerHTML = html;
}

async function updateStatus(id, type, status) {
if (!status) return;
const endpoint = type === 'akfa' ? `/api/akfa/${id}/status` : `/api/profilaktika/${id}/status`;
try {
const res = await fetch(endpoint, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({status})});
const data = await res.json();
if (data.ok) { await loadOrders(); }
else { alert('Xatolik: '+JSON.stringify(data)); }
} catch(e) {
alert('Server bilan bog\'lanishda xatolik: '+e.message);
}
}

loadOrders();
setInterval(loadOrders, 10000);
</script>
</body>
</html>
